<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Payment page for the sneaker store">
        <title>Payment</title>
        <link rel="stylesheet" href="payment.css"/>
    </head>
    <body>
        <section class="checkout-container">
         <!---Left-->
         <div class="checkout-left">
                <p class="sub-heading">Checkout</p>
                <h2>Contact Details</h2>
                <label for="email">Email ID</label>
                <input type ="email"  name="email" id="email" placeholder="Enter your Email Id"/>

                <h2>Payment</h2>
                <!--Payment Options-->
                <div class="payment options">
                    <button class="active">Credit Card</button>
                    <button>Debit card</button>
                    <button>Net Banking</button>
                    <button>UPI</button>       
                </div>
                <!--Card Form-->
                <div class="card-form">
                   <label for="card-number">Card Number</label>
                   <input type="text" id="card-number" placeholder="Enter your Card Number"/>
                   <div class="row">
                      <div>
                        <label for="expiry">Expiry Date</label>
                        <input type="text" id="expiry" placeholder="MM/YY"/>
                      </div>
                      <div>
                        <label for="cvv">CVV</label>
                        <input type="text" id="cvv" placeholder="Enter CVV"/>
                      </div>
                   </div>
                   <div class="row">
                       <div>
                        <label for="country">Country</label>
                        <select>
                            <option>India</option>
                         </select>                      
                         </div>
                         <div>
                            <label for="ZIP">ZIP Code</label>
                            <input type="text" id="zip" placeholder="XXX-XXX"/>
                         </div>
                   </div>
                </div>
         </div>
         <!--Right-->
         <div class="checkout-right">
            <h2>Order Summary</h2>
                <div class="summary-card">
                    <p class="label">Enter Coupon Code</p>
                            
                <div class="coupon">
                    <input type="text" placeholder="COUPON CODE">
                    <button>Apply Coupon</button>
                </div>

                <div class="summary">
                    <div><span>Sub Total</span><span>₹4,700</span></div>
                    <div><span>Taxes (if applicable)</span><span>₹199</span></div>
                    <div><span>Discount</span><span>₹0</span></div>
                    <div class="total"><span>Total</span><span>₹4,999</span></div>
                </div>
                </div>
                 <button class="pay-btn">Pay Now ₹4,999</button>

                <div class="payment-icons">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/89/Razorpay_logo.svg">
                </div>
         </div>
        </section>
    </body>
</html>
